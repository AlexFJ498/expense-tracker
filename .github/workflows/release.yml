name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
            tauri_target: windows
            tauri_arch: x86_64
          - os: ubuntu-latest
            artifact: linux
            tauri_target: linux
            tauri_arch: x86_64
          - os: macos-latest
            artifact: macos
            tauri_target: darwin
            tauri_arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - run: npm ci
      - run: npm run tauri build -- --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload updater manifest
        run: |
          $files = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter latest.json
          foreach ($f in $files) {
            $dest = "latest-${{ matrix.tauri_target }}-${{ matrix.tauri_arch }}.json"
            Copy-Item -LiteralPath $f.FullName -Destination $dest
            Write-Output "Uploading $dest"
          }
        shell: pwsh
        if: runner.os == 'Windows'
      - name: Upload updater manifest
        run: |
          find src-tauri/target/release/bundle -name latest.json -exec cp {} latest-${{ matrix.tauri_target }}-${{ matrix.tauri_arch }}.json \;
        if: runner.os != 'Windows'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            latest-*.json
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate checksums
        run: find . -type f -not -name "sha256*" -exec sha256sum {} \; > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            windows/**
            linux/**
            macos/**
            checksums.txt
          generate_release_notes: true
